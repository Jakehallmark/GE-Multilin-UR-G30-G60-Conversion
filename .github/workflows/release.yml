name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.3 — without v prefix)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "v${{ inputs.version }}".Trim()
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag must be semver like v1.0.0, got: $tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Verify version.json matches tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}" -replace '^v',''
          $json = (Get-Content aio/version.json -Raw | ConvertFrom-Json).version
          if ($json -ne $tag) {
            throw "aio/version.json version ($json) does not match tag ($tag)"
          }
          Write-Host "Release version $json"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller -r aio/requirements.txt

      - name: Build GUI exe
        shell: pwsh
        run: ./aio/build.ps1

      - name: Verify exe
        shell: pwsh
        run: |
          $exe = "release/G30-to-G60-Converter.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          Write-Host "Built $exe ($((Get-Item $exe).Length) bytes)"
          ./aio/verify-standalone.ps1 -ExePath $exe

      - name: Generate release notes
        shell: pwsh
        run: ./aio/generate-release-notes.ps1 -BuiltInCi

      - name: Publish SHA256 to workflow summary
        shell: pwsh
        run: |
          $exe = "release/G30-to-G60-Converter.exe"
          $sha = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash
          $sizeMb = [math]::Round((Get-Item -LiteralPath $exe).Length / 1MB, 1)
          Write-Host "SHA256 (BeyondTrust / Intune): $sha"
          @"
          ## G30-to-G60-Converter.exe

          | Property | Value |
          |----------|-------|
          | Size | $sizeMb MB |
          | SHA256 | ``$sha`` |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Create GitHub Release with exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: G30 → G60 Converter ${{ steps.version.outputs.tag }}
          body_path: release/RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            release/G30-to-G60-Converter.exe
            docs/STRESS_TEST_REPORT.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
