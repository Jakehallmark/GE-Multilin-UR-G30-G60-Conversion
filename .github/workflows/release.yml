name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.3 — without v prefix)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "v${{ inputs.version }}".Trim()
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag must be semver like v1.0.0, got: $tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller -r aio/requirements.txt

      - name: Build GUI exe
        shell: pwsh
        run: ./aio/build.ps1

      # Optional: sign the release exe (requires secrets — see aio/CODE_SIGNING.md).
      # - name: Azure login
      #   if: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT != '' }}
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #
      # - name: Install signing tool
      #   if: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT != '' }}
      #   run: dotnet tool install -g --prerelease sign
      #
      # - name: Build and sign GUI exe
      #   if: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT != '' }}
      #   shell: pwsh
      #   env:
      #     ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
      #     ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT }}
      #     ARTIFACT_SIGNING_PROFILE: ${{ secrets.ARTIFACT_SIGNING_PROFILE }}
      #   run: ./aio/build.ps1 -Sign

      - name: Verify exe
        shell: pwsh
        run: |
          $exe = "release/G30-to-G60-Converter.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          Write-Host "Built $exe ($((Get-Item $exe).Length) bytes)"

      - name: Create GitHub Release with exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/G30-to-G60-Converter.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
